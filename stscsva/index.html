<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic the Screensaver</title>
    <style>
        /* Base Styling: Denim Blue Theme */
        @font-face {
  font-family: "LCDSolid"; /* Simplified name (no spaces) */
  src: url("LcdSolid.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

body {
    margin: 0;
    background-color: #3073b7;
    color: white;
    text-align: center;
    padding: 40px 20px;
    font-family: "LCDSolid", sans-serif; /* Applied here */
}
        
        section { padding: 50px 20px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .grey-section { background-color: #114111; } /* Example for separate color scales */
        
        /* Navigation (Slide 2) */
        nav ul { list-style: none; display: flex; gap: 20px; justify-content: center; }
        nav a { color: white; text-decoration: none; font-weight: bold; }

        /* Gallery Layout (Slides 4 & 5) */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .gallery img { width: 100%; cursor: pointer; transition: 0.3s; }
        .modal {
            display: none; position: fixed; z-index: 1; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px); justify-content: center; align-items: center;
        }
        .modal img { max-width: 90%; max-height: 90%; }

    </style>
</head>
<body>

    <header>
        <h1>Sonic the Screensaver Art</h1>

const grid = document.getElementById('image-grid');
const modal = document.getElementById('imageModal');
const modalImg = document.getElementById('modalImg');

let artIndex = 0; // Track which image is open

myArtFiles.forEach((fileName, index) => {
    const img = document.createElement('img');
    img.src = `images/${fileName.trim()}`;
    img.alt = fileName;
    img.loading = "lazy";

    img.onerror = function() {
        console.warn(`Image not found or failed to load: ${fileName}`);
        this.style.display = 'none';
    };
    
img.onclick = function() {
    artIndex = index;
    openModal();
};

    grid.appendChild(img);
});
    
function openModal() {
    modalImg.src = `images/${myArtFiles[artIndex].trim()}`;
    modal.style.display = 'flex';
}
// Keyboard navigation
document.addEventListener('keydown', (e) => {
    if (modal.style.display !== 'flex') return; // Only if modal is open
    
if (e.key === 'ArrowRight') {
    artIndex = (artIndex + 1) % myArtFiles.length;
    openModal();
}
else if (e.key === 'ArrowLeft') {
    artIndex = (artIndex - 1 + myArtFiles.length) % myArtFiles.length;
    openModal();
}
else if (e.key === 'Escape') {
        modal.style.display = 'none';
    }
});
</script>
